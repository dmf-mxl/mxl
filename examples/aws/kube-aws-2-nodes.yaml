
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: writer-media-function
spec:
  selector:
    matchLabels:
      app: writer-media-function
  template:
    metadata:
      labels:
        app: writer-media-function
    spec:
      containers:
        - name: writer-container
          image: 720180693591.dkr.ecr.eu-central-1.amazonaws.com/mxl-writer:latest
          imagePullPolicy: IfNotPresent
          # If the image is private, configure ImagePullSecrets
          volumeMounts:
            - name: domain-volume
              mountPath: /domain
      volumes:
        - name: domain-volume
          hostPath:
            path: /tmp/domain-data
            type: DirectoryOrCreate
      restartPolicy: Always
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: reader-media-function
spec:
  selector:
    matchLabels:
      app: reader-media-function
  template:
    metadata:
      labels:
        app: reader-media-function
    spec:
      containers:
        - name: reader-container
          image: 720180693591.dkr.ecr.eu-central-1.amazonaws.com/mxl-reader:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              /app/mxl-gst-sink -d /domain -v 5fbec3b1-1b0f-417d-9059-8b94a47197ed &
              while true; do /app/mxl-info -d /domain -l || true; sleep 2; done
          resources:
            limits:
              memory: "2Gi"
          tty: true
          stdin: true
          volumeMounts:
            - name: domain-volume
              mountPath: /domain
              readOnly: true
      volumes:
        - name: domain-volume
          hostPath:
            path: /tmp/domain-data
            type: DirectoryOrCreate
      restartPolicy: Always

