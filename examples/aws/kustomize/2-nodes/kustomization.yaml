apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - kube-aws-2-nodes-efa.yaml

# Pin image tags (DMF-155). Bump the tag when promoting a verified build.
images:
  - name: 720180693591.dkr.ecr.eu-central-1.amazonaws.com/mxl-reader
    newTag: v1.0.56
  - name: 720180693591.dkr.ecr.eu-central-1.amazonaws.com/mxl-writer
    newTag: v1.0.56

# Provide flow UUID via ConfigMap (DMF-156).
# Override per environment by copying this overlay and changing the literal.
configMapGenerator:
  - name: mxl-config
    literals:
      - VIDEO_FLOW_UUID=5fbec3b1-1b0f-417d-9059-8b94a47197ed

# Disable hash suffix so the envFrom configMapRef name in the base manifest
# matches without needing a name reference transform.
generatorOptions:
  disableNameSuffixHash: true
