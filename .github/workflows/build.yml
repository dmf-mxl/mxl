name: Build, Test and Deploy the MXL Project

on:
  push:
    branches:
      - qvest
      - feature/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  checks: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  build_and_deploy:
    name: Build and Deploy MXL EFA Images
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'qvest' && github.event_name == 'push' && 'aws' || '' }}
    strategy:
      matrix:
        compiler: [Linux-GCC-Release] # Matching your multi-stage Dockerfile setup

    env:
      DOCKER_BUILDKIT: 1
      AWS_REGION: eu-central-1
      DEPLOY: ${{ github.ref_name == 'qvest' && github.event_name == 'push' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        if: env.DEPLOY == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::720180693591:role/github-ecr-push-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: env.DEPLOY == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Determine the tag based on the branch
      - name: Set Image Tag
        id: vars
        run: |
          if [[ "${{ github.ref_name }}" == "qvest" ]]; then
            # SemVer tag for main branch merges
            echo "tag=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
          else
            # SHA tag for feature branches
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
          echo "gh_base=ghcr.io/${{ github.repository_owner }}" >> $GITHUB_OUTPUT

      # Step 1: Build and Push the Base Image (With Caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Base Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: examples/Dockerfile.efa.base
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mxl-base:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/mxl-base:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/mxl-base:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/mxl-base:buildcache,mode=max

      # Step 2: Build and Push Writer Image (Inherits from Base)
      - name: Build and Push Writer
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ vars.ECR_REPOSITORY_WRITER }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          docker build \
            --build-arg BASE_TAG=${TAG} \
            -f examples/Dockerfile.efa.writer \
            -t ${{ steps.vars.outputs.gh_base }}/mxl-writer:${TAG} \
            .
          docker push ${{ steps.vars.outputs.gh_base }}/mxl-writer:${TAG}
          if [[ "${{ env.DEPLOY }}" == "true" ]]; then
            docker tag ${{ steps.vars.outputs.gh_base }}/mxl-writer:${TAG} ${ECR_REGISTRY}/${REPO}:${TAG}
            docker tag ${{ steps.vars.outputs.gh_base }}/mxl-writer:${TAG} ${ECR_REGISTRY}/${REPO}:latest
            docker push ${ECR_REGISTRY}/${REPO}:${TAG}
            docker push ${ECR_REGISTRY}/${REPO}:latest
          fi

      # Step 3: Build and Push Reader Image (Inherits from Base)
      - name: Build and Push Reader
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ vars.ECR_REPOSITORY_READER }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          docker build \
            --build-arg BASE_TAG=${TAG} \
            -f examples/Dockerfile.efa.reader \
            -t ${{ steps.vars.outputs.gh_base }}/mxl-reader:${TAG} \
            .
          docker push ${{ steps.vars.outputs.gh_base }}/mxl-reader:${TAG}
          if [[ "${{ env.DEPLOY }}" == "true" ]]; then
            docker tag ${{ steps.vars.outputs.gh_base }}/mxl-reader:${TAG} ${ECR_REGISTRY}/${REPO}:${TAG}
            docker tag ${{ steps.vars.outputs.gh_base }}/mxl-reader:${TAG} ${ECR_REGISTRY}/${REPO}:latest
            docker push ${ECR_REGISTRY}/${REPO}:${TAG}
            docker push ${ECR_REGISTRY}/${REPO}:latest
          fi
